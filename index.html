<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Ori Guy · פורטל לקוחות</title>
    <meta
      name="description"
      content="מערכת ניהול לקוחות ופרויקטים של סטודיו אורי גיא"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before first paint to avoid a flash (default: dark).
      (function () {
        try {
          var t = localStorage.getItem("sog-theme");
          if (t !== "light") {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

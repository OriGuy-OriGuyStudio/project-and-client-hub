    <script>
      // Apply saved theme before first paint to avoid a flash (default: dark).
      (function () {
        try {
          var t = localStorage.getItem("sog-theme");
          if (t !== "light") {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) {}
      })();
    </script>
